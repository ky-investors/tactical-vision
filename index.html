<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACTICAL VISION DASHBOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base:       #181B20;
    --bg-panel:      #1F2329;
    --bg-card:       #252A32;
    --border:        #2E3545;
    --border-accent: #3D4A60;
    --accent-blue:   #4A90D9;
    --accent-cyan:   #36BFA0;
    --accent-amber:  #E8A838;
    --accent-rose:   #D9536A;
    --text-primary:  #E8ECF4;
    --text-secondary:#8B95A8;
    --text-dim:      #5A6478;
    --header-h:      44px;
    --tape-h:        56px;
    --font-mono:     'Space Mono', monospace;
    --font-display:  'Syne', sans-serif;
    --font-jp:       'Noto Sans JP', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-jp);
    font-size: 12px;
    overflow: hidden;
  }

  .shell {
    display: grid;
    grid-template-rows: var(--header-h) var(--tape-h) 1fr;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }

  .top-header {
    display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
    background: linear-gradient(90deg, #181B20 0%, #1F2A38 50%, #181B20 100%);
    border-bottom: 1px solid var(--border); gap: 16px; z-index: 10;
  }
  .logo-group { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 24px; height: 24px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
  }
  .logo-text { font-family: var(--font-display); font-weight: 800; font-size: 13px; letter-spacing: 0.12em; line-height: 1; }
  .logo-sub { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 0.18em; line-height: 1; margin-top: 2px;}
  .header-meta { display: flex; align-items: center; gap: 20px; flex: 1; justify-content: flex-end; }
  .meta-pill { display: flex; align-items: center; gap: 6px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; }
  .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-cyan); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(54,191,160,0.5); } 50% { opacity: 0.6; box-shadow: 0 0 0 4px rgba(54,191,160,0); } }
  .meta-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; color: var(--text-secondary); }
  #clock { font-family: var(--font-mono); font-size: 11px; color: var(--accent-blue); letter-spacing: 0.06em; }

  .tape-row { background: var(--bg-panel); border-bottom: 1px solid var(--border); overflow: hidden; }
  .tape-row .tradingview-widget-container,
  .tape-row .tradingview-widget-container__widget { height: var(--tape-h) !important; }

  .main-body {
    display: grid;
    grid-template-columns: repeat(4, 310px) 1fr;
    gap: 0;
    overflow: hidden;
    height: 100%;
  }

  .col { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); height: 100%; }
  .col:last-child { border-right: none; }

  .col-header {
    display: flex; align-items: center; gap: 8px; padding: 6px 12px;
    background: var(--bg-panel); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .col-header-icon { width: 3px; height: 14px; border-radius: 2px; flex-shrink: 0; }
  .icon-blue  { background: var(--accent-blue); }
  .icon-cyan  { background: var(--accent-cyan); }
  .icon-amber { background: var(--accent-amber); }
  .icon-grey  { background: #8B95A8; }
  .col-title { font-family: var(--font-display); font-weight: 700; font-size: 9px; letter-spacing: 0.14em; color: var(--text-secondary); text-transform: uppercase; }

  .section-label {
    display: flex; align-items: center; gap: 6px; padding: 5px 12px 4px;
    background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .section-label span { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.14em; color: var(--text-dim); }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ウィジェットブロック：ロゴを下にはみ出してクリップ */
  .widget-block { overflow: hidden; min-height: 0; position: relative; }
  .widget-block .tradingview-widget-container { height: 100% !important; width: 100% !important; overflow: hidden; }
  .widget-block .tradingview-widget-container__widget { height: calc(100% + 34px) !important; width: 100% !important; }

  /* mini-cell内ウィジェットも同様 */
  .mini-cell .tradingview-widget-container { height: 100%; width: 100%; overflow: hidden; }
  .mini-cell .tradingview-widget-container__widget { height: calc(100% + 34px) !important; width: 100% !important; }

  /* テープのロゴクリップ */
  .tape-row .tradingview-widget-container { overflow: hidden; }
  .tape-row .tradingview-widget-container__widget { height: calc(var(--tape-h) + 34px) !important; }

  /* ─── COL4: RATES 2分割 ─── */
  .rates-col-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .rates-section {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
    border-bottom: 1px solid var(--border);
  }
  .rates-section:last-child { border-bottom: none; }

  /* 米国債・為替：5行ぴったり収まる最小高さに、商品は残り全て */
  .bond-fx-area { flex: 0 0 48%; }
  .commo-area   { flex: 1; }

  /* ─── COMPETITORS 2×3グリッド ─── */
  .competitor-grid {
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 1px;
    background: var(--border); height: 100%; flex: 1; overflow: hidden;
  }
  .mini-cell { background: var(--bg-base); overflow: hidden; position: relative; }
  .mini-cell-label {
    position: absolute; bottom: 6px; left: 6px;
    font-family: var(--font-mono); font-size: 8px; font-weight: bold; letter-spacing: 0.08em;
    color: var(--text-primary); z-index: 2; pointer-events: none;
    background: rgba(24,27,32,0.85); padding: 2px 6px; border-radius: 3px;
  }

  /* ─── LOADING ─── */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg-base);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; transition: opacity 0.6s ease; gap: 16px;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; display: none; }
  .loader-logo { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: 0.2em; background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .loader-bar-wrap { width: 200px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .loader-bar { height: 100%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); animation: loadbar 1.5s ease forwards; width: 0%; }
  @keyframes loadbar { 0% { width: 0%; } 80% { width: 90%; } 100% { width: 100%; } }
  .shell { opacity: 0; transition: opacity 0.5s ease; }
  .shell.visible { opacity: 1; }
</style>
</head>

<script>
  function updateClock() {
    const now = new Date();
    const opts = { timeZone: 'Asia/Tokyo', hour12: false, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' };
    document.getElementById('clock').textContent = new Intl.DateTimeFormat('ja-JP', opts).format(now) + ' JST';
  }
  updateClock(); setInterval(updateClock, 1000);

  let loaded = false;
  function hideLoader() {
    if (loaded) return; loaded = true;
    document.getElementById('loadOverlay').classList.add('hidden');
    document.getElementById('mainShell').classList.add('visible');
  }
  window.addEventListener('load', () => setTimeout(hideLoader, 500));
  setTimeout(hideLoader, 2500);
</script>
